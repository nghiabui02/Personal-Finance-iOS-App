name: Personal Finance
options:
  bundleIdPrefix: com.nghiabui
  deploymentTarget:
    iOS: "17.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Personal Finance:
    type: application
    platform: iOS
    sources:
      - path: Personal Finance
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    info:
      path: Personal Finance/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        SupabaseURL: $(SUPABASE_URL)
        SupabaseAnonKey: $(SUPABASE_ANON_KEY)
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nghiabui.personalfinance
        DEVELOPMENT_TEAM: 9FZ4FK5W4C
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"

  Personal FinanceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Personal FinanceTests
    dependencies:
      - target: Personal Finance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nghiabui.personalfinance.tests
        DEVELOPMENT_TEAM: 9FZ4FK5W4C
        SWIFT_EMIT_LOC_STRINGS: YES

  Personal FinanceUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Personal FinanceUITests
    dependencies:
      - target: Personal Finance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.nghiabui.personalfinance.uitests
        DEVELOPMENT_TEAM: 9FZ4FK5W4C
        SWIFT_EMIT_LOC_STRINGS: YES
